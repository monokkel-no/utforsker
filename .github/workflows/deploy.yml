name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Show build output
        run: |
          echo "=== apps/web top-level ==="
          ls -la apps/web/
          echo "=== Searching for output dirs ==="
          find apps/web -maxdepth 4 -type d \( -name ".output" -o -name "dist" -o -name ".netlify" \) 2>/dev/null || echo "none found"

      - name: Deploy to Netlify
        working-directory: apps/web
        run: pnpm --package=netlify-cli dlx netlify deploy --prod --dir ${{ github.workspace }}/apps/web/.output/public --functions ${{ github.workspace }}/apps/web/.output/server
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
